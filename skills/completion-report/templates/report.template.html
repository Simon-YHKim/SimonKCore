<!-- completion-report 템플릿 — 자체완결(인라인 CSS/SVG). {{...}} 를 채우고, 데이터 없는 섹션은 삭제. 사용자 언어로 작성. -->
<!doctype html><html lang="{{LANG}}"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}} — 완료 보고</title>
<style>
  :root{--bg:#0f1117;--card:#171a23;--text:#e7e9ee;--muted:#9aa3b2;--accent:#5b8cff;--ok:#3ecf8e;--warn:#e0a23c;--line:#262a36}
  @media(prefers-color-scheme:light){:root{--bg:#f7f8fb;--card:#fff;--text:#1b1f2a;--muted:#5b6470;--line:#e6e9f0}}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.6 Pretendard,system-ui,-apple-system,"Segoe UI",sans-serif}
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px}
  h1{font-size:24px;margin:0 0 4px}h2{font-size:16px;margin:28px 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .meta{color:var(--muted);font-size:14px}.time{font-variant-numeric:tabular-nums;color:var(--accent);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin:12px 0}
  table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600}
  .b-ok{background:rgba(62,207,142,.15);color:var(--ok)}.b-part{background:rgba(224,162,60,.15);color:var(--warn)}.b-wait{background:rgba(154,163,178,.15);color:var(--muted)}
  ul{margin:6px 0;padding-left:18px}figure{margin:10px 0}img{max-width:100%;border-radius:8px;border:1px solid var(--line)}
  .foot{color:var(--muted);font-size:12px;margin-top:28px;border-top:1px solid var(--line);padding-top:12px}
</style></head><body><div class="wrap">

  <h1>{{TITLE}}</h1>
  <div class="meta">{{PLUGIN}} · 완료 <span class="time">{{COMPLETED_AT}}</span></div>
  <div class="card">{{SUMMARY_ONE_LINE}}</div>

  <h2>무엇을 했나</h2>
  <div class="card"><table>
    <tr><th>항목</th><th>상태</th><th>산출물</th></tr>
    <tr><td>{{ITEM}}</td><td><span class="badge b-ok">완료</span></td><td>{{ARTIFACT}}</td></tr>
    <!-- b-part=부분, b-wait=대기 -->
  </table></div>

  <h2>결과 · 지표</h2>
  <div class="card">
    <!-- 예시 bar chart: 전/후 비교. 값 라벨·축 포함. 데이터 있을 때만. -->
    <svg viewBox="0 0 360 160" width="100%" role="img" aria-label="{{CHART_LABEL}}">
      <line x1="40" y1="130" x2="340" y2="130" stroke="var(--line)"/>
      <rect x="80" y="{{Y_BEFORE}}" width="48" height="{{H_BEFORE}}" fill="var(--muted)"/><text x="104" y="148" fill="var(--muted)" font-size="11" text-anchor="middle">{{LABEL_A}}</text>
      <rect x="200" y="{{Y_AFTER}}" width="48" height="{{H_AFTER}}" fill="var(--accent)"/><text x="224" y="148" fill="var(--muted)" font-size="11" text-anchor="middle">{{LABEL_B}}</text>
      <text x="104" y="{{T_BEFORE}}" fill="var(--text)" font-size="12" text-anchor="middle">{{VAL_A}}</text>
      <text x="224" y="{{T_AFTER}}" fill="var(--text)" font-size="12" text-anchor="middle">{{VAL_B}}</text>
    </svg>
  </div>

  <h2>시각 증거</h2>
  <figure><img src="{{IMG_PATH_OR_BASE64}}" alt="{{IMG_ALT}}"><figcaption class="meta">{{IMG_CAPTION}}</figcaption></figure>

  <h2>다음 단계</h2>
  <div class="card"><ul><li>{{NEXT_1}}</li><li>{{NEXT_2}}</li></ul></div>

  <div class="foot">생성 {{COMPLETED_AT}} · SimonK completion-report · {{LINKS}}</div>
</div></body></html>
